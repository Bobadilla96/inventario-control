<section class="form-shell inv-panel">
  <header class="form-head">
    <div>
      <p class="inv-kicker">Maestro de productos</p>
      <h2>{{ editingProduct ? 'Editar producto' : 'Nuevo producto' }}</h2>
      <p class="inv-subtle">
        {{ editingProduct ? 'Actualiza datos del producto y stock base.' : 'Registrar nuevo item en inventario.' }}
      </p>
    </div>
    <a class="back-link" routerLink="/inventory">Volver</a>
  </header>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="sku-box">
      <span>SKU generado</span>
      <strong>{{ skuPreview || '---' }}</strong>
    </div>

    <label>
      <span>Nombre *</span>
      <input class="inv-field" formControlName="name" type="text" />
    </label>

    <label class="wide">
      <span>Descripcion *</span>
      <textarea class="inv-field" formControlName="description" rows="3"></textarea>
    </label>

    <label>
      <span>Categoria *</span>
      <select class="inv-field" formControlName="category">
        <option *ngFor="let category of categories" [value]="category.name">{{ category.name }}</option>
      </select>
    </label>

    <label>
      <span>Ubicacion *</span>
      <input class="inv-field" formControlName="location" type="text" />
    </label>

    <label>
      <span>Precio *</span>
      <input class="inv-field" formControlName="price" type="number" min="0" step="0.01" />
    </label>

    <label>
      <span>Costo *</span>
      <input class="inv-field" formControlName="cost" type="number" min="0" step="0.01" />
    </label>

    <label>
      <span>Stock inicial *</span>
      <input class="inv-field" formControlName="stock" type="number" min="0" />
    </label>

    <label>
      <span>Stock minimo *</span>
      <input class="inv-field" formControlName="minStock" type="number" min="1" />
    </label>

    <label>
      <span>Estado *</span>
      <select class="inv-field" formControlName="status">
        <option value="active">Activo</option>
        <option value="discontinued">Descontinuado</option>
      </select>
    </label>

    <p class="error wide" *ngIf="error">{{ error }}</p>

    <footer class="wide">
      <button type="submit" class="inv-btn-primary" [disabled]="isSaving">
        {{ editingProduct ? 'Guardar cambios' : 'Crear producto' }}
      </button>
    </footer>
  </form>
</section>
